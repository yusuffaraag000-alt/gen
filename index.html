<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Epistasis Lab - Full Responsive</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;}
body{background:linear-gradient(135deg,#1e3c72,#2a5298);min-height:100vh;padding:20px;color:#fff;}
.container{max-width:1500px;margin:auto;}
h1{text-align:center;margin-bottom:10px;font-size:2.5rem;text-shadow:2px 2px 5px rgba(0,0,0,0.3);}
.subtitle{text-align:center;margin-bottom:20px;font-size:1.2rem;opacity:0.9;}
.cases-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(350px,1fr));gap:20px;}
.case-card{background:rgba(255,255,255,0.95);color:#333;border-radius:15px;padding:15px;box-shadow:0 10px 20px rgba(0,0,0,0.25);transition:all 0.3s ease;}
.case-header{display:flex;justify-content:space-between;align-items:center;background:linear-gradient(135deg,#667eea,#764ba2);padding:10px 15px;border-radius:15px 15px 0 0;color:white;flex-wrap:wrap;}
.case-title{font-weight:bold;font-size:1.2rem;}
.case-ratio{background:rgba(255,255,255,0.2);padding:5px 10px;border-radius:30px;font-weight:bold;margin-top:5px;}
.gene-panel{display:flex;gap:10px;margin:10px 0;flex-wrap:wrap;}
.drag-card{width:80px;height:100px;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:white;font-weight:bold;cursor:grab;transition:all 0.3s ease;box-shadow:0 5px 15px rgba(0,0,0,0.2);position:relative;}
.drag-card:active{cursor:grabbing;transform:scale(0.97);}
.card-gene{font-size:1.2rem;}
.card-phenotype{font-size:0.8rem;text-align:center;}
.card-locus-badge{position:absolute;top:-8px;left:-8px;background:rgba(0,0,0,0.6);width:22px;height:22px;border-radius:50%;display:flex;justify-content:center;align-items:center;font-size:0.7rem;}
.drop-zone{display:flex;align-items:center;gap:10px;margin:10px 0;justify-content:center;flex-wrap:wrap;}
.drop-area{width:90px;height:100px;border:2px dashed #95a5a6;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all 0.3s ease;position:relative;}
.drop-area.drag-over{background:rgba(46,204,113,0.2);border-style:solid;transform:scale(1.05);}
.drop-area.has-card{border-style:solid;background:#fff;}
.drop-area .drag-card{cursor:default;box-shadow:0 5px 10px rgba(0,0,0,0.3);}
.drop-area-label{font-size:0.7rem;text-align:center;position:absolute;bottom:-18px;width:100%;}
.result-box{width:90px;height:100px;background:linear-gradient(145deg,#95a5a6,#7f8c8d);border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:white;box-shadow:0 8px 15px rgba(0,0,0,0.2);transition:all 0.3s ease;}
.result-genotype{font-size:1rem;text-align:center;font-weight:bold;}
.result-phenotype{font-size:0.8rem;text-align:center;background:rgba(0,0,0,0.2);padding:2px 5px;border-radius:12px;margin-top:5px;transition:all 0.3s ease;}
.phenotype-table{margin-top:15px;background:#f8f9fa;color:#17181a;padding:10px;border-radius:12px;overflow-x:auto;}
.phenotype-table table{width:100%;border-collapse:collapse;}
.phenotype-table th, .phenotype-table td{padding:5px;text-align:center;border:1px solid #ccc;}
.example-box{background:#fff3e0;color:#333;border-left:4px solid #f39c12;padding:10px;border-radius:8px;margin-top:10px;}
.reset-btn{background:#e74c3c;color:white;padding:5px 10px;border:none;border-radius:8px;cursor:pointer;margin-top:10px;transition:all 0.3s ease;}
.reset-btn:hover{background:#c0392b;}
@media (max-width:600px){
  .drag-card{width:60px;height:80px;font-size:0.9rem;}
  .drop-area{width:70px;height:80px;}
  .result-box{width:70px;height:80px;}
}
</style>
</head>
<body>
<div class="container">
<h1>🧬 Interactive Epistasis Lab</h1>
<p class="subtitle">Drag & drop Locus cards to see resulting phenotype and genotypes. Each case includes a real biological example.</p>
<div class="cases-grid" id="casesGrid"></div>
</div>

<script>
const epistasisCases=[
  // Recessive Epistasis
  {id:1,name:"Recessive Epistasis",ratio:"9:3:4",
   geneA:{dominant:{symbol:"A_",phenotype:"Pigment",color:"#27ae60"},recessive:{symbol:"aa",phenotype:"No Pigment",color:"#f1c40f"}},
   geneB:{dominant:{symbol:"B_",phenotype:"Black",color:"#2c3e50"},recessive:{symbol:"bb",phenotype:"Brown",color:"#8B4513"}},
   example:"Labrador Coat Color - aa masks B gene (Hartwell et al., Genetics 7th Edition)",
   getPhenotype:(a,b)=>a==='aa'?{name:"Yellow",color:"#f1c40f"}:b==='B_'?{name:"Black",color:"#2c3e50"}:{name:"Brown",color:"#8B4513"},
   phenotypeTable:[{genotype:"A_B_",phenotype:"Black",ratio:9},{genotype:"A_bb",phenotype:"Brown",ratio:3},{genotype:"aaB_",phenotype:"Yellow",ratio:3},{genotype:"aabb",phenotype:"Yellow",ratio:1}]
  },
  // Dominant Epistasis
  {id:2,name:"Dominant Epistasis",ratio:"12:3:1",
   geneA:{dominant:{symbol:"W_",phenotype:"White",color:"#ecf0f1"},recessive:{symbol:"ww",phenotype:"Color Allowed",color:"#f1c40f"}},
   geneB:{dominant:{symbol:"Y_",phenotype:"Yellow",color:"#f1c40f"},recessive:{symbol:"yy",phenotype:"Green",color:"#27ae60"}},
   example:"Squash Fruit Color - W masks Y gene (Hartwell et al.)",
   getPhenotype:(a,b)=>a.startsWith("W")?{name:"White",color:"#ecf0f1"}:b.startsWith("Y")?{name:"Yellow",color:"#f1c40f"}:{name:"Green",color:"#27ae60"},
   phenotypeTable:[{genotype:"W_Y_",phenotype:"White",ratio:9},{genotype:"W_yy",phenotype:"White",ratio:3},{genotype:"wwY_",phenotype:"Yellow",ratio:3},{genotype:"wwyy",phenotype:"Green",ratio:1}]
  },
  // Duplicate Genes with cumulative effect
  {id:3,name:"Duplicate Genes (Cumulative)",ratio:"9:6:1",
   geneA:{dominant:{symbol:"C_",phenotype:"Red Pigment",color:"#e74c3c"},recessive:{symbol:"cc",phenotype:"No Pigment",color:"#f1c40f"}},
   geneB:{dominant:{symbol:"D_",phenotype:"Red Pigment",color:"#c0392b"},recessive:{symbol:"dd",phenotype:"No Pigment",color:"#f1c40f"}},
   example:"Snapdragon Flower Pigment - cumulative effect of C and D",
   getPhenotype:(a,b)=>{let count=0; if(a.startsWith("C")) count++; if(b.startsWith("D")) count++; return count===2?{name:"Strong Red",color:"#e74c3c"}:count===1?{name:"Light Red",color:"#c0392b"}:{name:"No Color",color:"#f1c40f"};},
   phenotypeTable:[{genotype:"C_D_",phenotype:"Strong Red",ratio:9},{genotype:"C_dd",phenotype:"Light Red",ratio:3},{genotype:"ccD_",phenotype:"Light Red",ratio:3},{genotype:"ccdd",phenotype:"No Color",ratio:1}]
  },
  // Duplicate Dominant Epistasis
  {id:4,name:"Duplicate Dominant Epistasis",ratio:"15:1",
   geneA:{dominant:{symbol:"E_",phenotype:"White",color:"#ecf0f1"},recessive:{symbol:"ee",phenotype:"Color Allowed",color:"#f1c40f"}},
   geneB:{dominant:{symbol:"F_",phenotype:"White",color:"#ecf0f1"},recessive:{symbol:"ff",phenotype:"Color Allowed",color:"#27ae60"}},
   example:"Pepper Fruit Color - either dominant E or F produces White fruit",
   getPhenotype:(a,b)=>a.startsWith("E")||b.startsWith("F")?{name:"White",color:"#ecf0f1"}:{name:"Colored",color:"#27ae60"},
   phenotypeTable:[{genotype:"E_F_",phenotype:"White",ratio:9},{genotype:"E_ff",phenotype:"White",ratio:3},{genotype:"eeF_",phenotype:"White",ratio:3},{genotype:"eeff",phenotype:"Colored",ratio:1}]
  },
  // Duplicate Recessive Epistasis (Modified)
{
  id:5,
  name:"Duplicate Recessive Epistasis",
  ratio:"9:7", // لأن فقط G_H_ يعطي Pigment، الباقي 15 احتمالات No Pigment
  geneA:{dominant:{symbol:"G_",phenotype:"Pigment",color:"#16a085"},recessive:{symbol:"gg",phenotype:"No Pigment",color:"#f1c40f"}},
  geneB:{dominant:{symbol:"H_",phenotype:"Pigment",color:"#16a085"},recessive:{symbol:"hh",phenotype:"No Pigment",color:"#f1c40f"}},
  example:"Sweet Pea Color - only G_ + H_ gives Pigment, all others No Pigment",
  getPhenotype:(a,b)=>(a.startsWith("G") && b.startsWith("H")) ? {name:"Pigment",color:"#16a085"} : {name:"No Pigment",color:"#f1c40f"},
  phenotypeTable:[
    {genotype:"G_H_",phenotype:"Pigment",ratio:9},
    {genotype:"G_hh",phenotype:"No Pigment",ratio:3},
    {genotype:"ggH_",phenotype:"No Pigment",ratio:3},
    {genotype:"gghh",phenotype:"No Pigment",ratio:1}
  ]
},
  // Dominant & Recessive Interaction
  // Dominant & Recessive Interaction (Modified)
{
  id:6,
  name:"Dominant & Recessive Interaction",
  ratio:"3:13", // تقريبا، aaB_ يعطي Pink، باقي الاحتمالات Red
  geneA:{dominant:{symbol:"A_",phenotype:"Dominant Mask",color:"#c0392b"},recessive:{symbol:"aa",phenotype:"Recessive",color:"#f1c40f"}},
  geneB:{dominant:{symbol:"B_",phenotype:"Trait",color:"#2980b9"},recessive:{symbol:"bb",phenotype:"No Trait",color:"#95a5a6"}},
  example:"Corn Kernel Color - aa + B_ gives Pink, all others Red",
  getPhenotype:(a,b)=>(a==='aa' && b.startsWith("B")) ? {name:"Pink", color:"#FFC0CB"} : {name:"Red", color:"#c0392b"},
  phenotypeTable:[
    {genotype:"aaB_",phenotype:"Pink",ratio:3},
    {genotype:"aabb",phenotype:"Red",ratio:1},
    {genotype:"iiB_",phenotype:"Red",ratio:9}, // باقي الاحتمالات
    {genotype:"ii bb",phenotype:"Red",ratio:3}
  ]
}
];

const casesGrid=document.getElementById('casesGrid');

function createCaseCard(caseData){
    const cardWrapper=document.createElement('div');
    cardWrapper.className='case-card';
    cardWrapper.innerHTML=`
    <div class="case-header">
        <div class="case-title">${caseData.name}</div>
        <div class="case-ratio">${caseData.ratio}</div>
    </div>
    <button class="reset-btn">Reset</button>
    <div class="gene-panel" id="genePanel${caseData.id}"></div>
    <div class="drop-zone" id="dropZone${caseData.id}">
        <div class="drop-area" data-locus="A"><div class="drop-area-label">Locus A</div></div>
        <div class="drop-area" data-locus="B"><div class="drop-area-label">Locus B</div></div>
        <div class="drop-area" data-locus="Result"><div class="drop-area-label">Phenotype</div><div class="result-box"><div class="result-genotype">--</div><div class="result-phenotype">--</div></div></div>
    </div>
    <div class="example-box">${caseData.example}</div>
    <div class="phenotype-table" id="table${caseData.id}"></div>
    `;
    casesGrid.appendChild(cardWrapper);

    const genePanel=document.getElementById(`genePanel${caseData.id}`);
    ['A','B'].forEach(locus=>{
        ['dominant','recessive'].forEach(type=>{
            const gene=caseData['gene'+locus][type];
            const card=document.createElement('div');
            card.className='drag-card';
            card.setAttribute('draggable','true');
            card.setAttribute('data-locus',locus);
            card.setAttribute('data-type',type);
            card.style.background=gene.color;
            card.innerHTML=`<div class="card-locus-badge">${locus}</div><div class="card-gene">${gene.symbol}</div><div class="card-phenotype">${gene.phenotype}</div>`;
            genePanel.appendChild(card);
            card.addEventListener('dragstart',e=>{e.dataTransfer.setData('text/plain',JSON.stringify({locus,type})); card.classList.add('dragging');});
            card.addEventListener('dragend',()=>card.classList.remove('dragging'));
        });
    });

    const dropAreas=cardWrapper.querySelectorAll('.drop-area');
    dropAreas.forEach(area=>{
        area.addEventListener('dragover',e=>{e.preventDefault();area.classList.add('drag-over');});
        area.addEventListener('dragleave',()=>area.classList.remove('drag-over'));
        area.addEventListener('drop',e=>{
            e.preventDefault();area.classList.remove('drag-over');
            const data=JSON.parse(e.dataTransfer.getData('text/plain'));
            const existing=area.querySelector('.drag-card'); if(existing) existing.remove();
            const gene=caseData['gene'+data.locus][data.type];
            const card=document.createElement('div');
            card.className='drag-card';
            card.style.background=gene.color;
            card.innerHTML=`<div class="card-gene">${gene.symbol}</div><div class="card-phenotype">${gene.phenotype}</div>`;
            area.appendChild(card);
            area.classList.add('has-card');
            const dropA=cardWrapper.querySelector('.drop-area[data-locus="A"] .drag-card');
            const dropB=cardWrapper.querySelector('.drop-area[data-locus="B"] .drag-card');
            const resultBox=cardWrapper.querySelector('.result-box');
            if(dropA && dropB){
                const aGeno=dropA.querySelector('.card-gene').textContent;
                const bGeno=dropB.querySelector('.card-gene').textContent;
                const result=caseData.getPhenotype(aGeno,bGeno);
                resultBox.querySelector('.result-genotype').textContent=aGeno+bGeno;
                resultBox.querySelector('.result-phenotype').textContent=result.name;
                resultBox.style.background=result.color;
            }
        });
    });

    const tableDiv=document.getElementById(`table${caseData.id}`);
    let html='<table><tr><th>Genotype</th><th>Ratio</th><th>Phenotype</th></tr>';
    caseData.phenotypeTable.forEach(item=>{html+=`<tr><td>${item.genotype}</td><td>${item.ratio}</td><td>${item.phenotype}</td></tr>`;});
    html+='</table>'; tableDiv.innerHTML=html;

    const resetBtn=cardWrapper.querySelector('.reset-btn');
    resetBtn.addEventListener('click',()=>{
        dropAreas.forEach(area=>{const c=area.querySelector('.drag-card'); if(c) c.remove(); area.classList.remove('has-card');});
        const resultBox=cardWrapper.querySelector('.result-box');
        resultBox.querySelector('.result-genotype').textContent='--';
        resultBox.querySelector('.result-phenotype').textContent='--';
        resultBox.style.background='linear-gradient(145deg,#95a5a6,#7f8c8d)';
    });
}

epistasisCases.forEach(c=>createCaseCard(c));
</script>
</body>
</html>
